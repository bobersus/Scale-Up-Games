<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>All Games | ScaleUp Games</title>
    <meta name="description" content="All ScaleUp Games Roblox projects with live CCU data." />
    <link rel="icon" type="image/png" href="images/small_logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@700;800;900;1000&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" data-header>
      <div class="header-shell liquid">
        <a class="brand" href="/home" aria-label="ScaleUp Games home">
          <img class="brand-logo" src="images/logo.png" alt="" aria-hidden="true" />
          <span class="brand-name">ScaleUp Games</span>
        </a>
        <button class="nav-toggle liquid" type="button" aria-label="Open navigation" data-nav-toggle>
          <span></span>
          <span></span>
        </button>
        <nav class="nav-pill liquid" aria-label="Main navigation" data-nav>
          <a class="nav-link" href="/home">Home</a>
          <a class="nav-link" href="/about">About</a>
          <a class="nav-link active" href="/games">Games</a>
          <a class="btn btn-small btn-primary" href="/contact">Contact Us</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-hero section-grid">
        <div class="section-heading">
          <h1>All Games</h1>
          <p>Every ScaleUp Games project from the shared game table, with live CCU where IDs are added.</p>
        </div>
        <div class="games-grid all-games-grid" id="allGamesGrid" aria-live="polite"></div>
      </section>
    </main>

    <footer class="site-footer compact-footer">
      <div class="footer-inner">
        <div class="footer-brand">
          <a class="brand footer-logo" href="/home" aria-label="ScaleUp Games home">
            <span class="brand-mark">SU</span>
            <span class="brand-name">ScaleUp Games</span>
          </a>
          <p>We scale Roblox games.</p>
        </div>
        <div class="footer-column">
          <h3>Company</h3>
          <a href="/acquisition">Game Acquisition</a>
          <a href="/contact">Contact Us</a>
        </div>
        <div class="footer-column">
          <h3>Socials</h3>
          <a href="https://www.roblox.com/" target="_blank" rel="noreferrer">Roblox</a>
          <a href="https://discord.com/" target="_blank" rel="noreferrer">Discord</a>
        </div>
        <div class="footer-column">
          <h3>Legal</h3>
          <a href="/privacy-policy" target="_blank" rel="noopener">Privacy Policy</a>
        </div>
      </div>
      <div class="footer-bottom">
        <span>&copy; <span data-year></span> ScaleUp Games</span>
      </div>
    </footer>

    <script src="games-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
